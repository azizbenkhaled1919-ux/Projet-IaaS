---
# ─────────────────────────────────────────────────────────────
# Rôle : docker
# Installe Docker Engine et Docker Compose sur Amazon Linux 2023 / Ubuntu
# ─────────────────────────────────────────────────────────────

# ── Amazon Linux 2023 ──────────────────────────────────────
- name: Installer Docker (Amazon Linux)
  yum:
    name:
      - docker
      - python3-pip
    state: present
  when: ansible_os_family == "RedHat"

# ── Ubuntu/Debian ──────────────────────────────────────────
- name: Installer les dépendances Docker (Debian)
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
  when: ansible_os_family == "Debian"

- name: Ajouter la clé GPG Docker (Debian)
  shell: |
    install -m 0755 -d /etc/apt/keyrings
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
      | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    chmod a+r /etc/apt/keyrings/docker.gpg
  when: ansible_os_family == "Debian"
  args:
    creates: /etc/apt/keyrings/docker.gpg

- name: Ajouter le dépôt Docker (Debian)
  shell: |
    echo \
      "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
      https://download.docker.com/linux/ubuntu \
      $(. /etc/os-release && echo "$VERSION_CODENAME") stable" \
      | tee /etc/apt/sources.list.d/docker.list > /dev/null
    apt-get update
  when: ansible_os_family == "Debian"

- name: Installer Docker CE (Debian)
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
  when: ansible_os_family == "Debian"

# ── Commun ─────────────────────────────────────────────────
- name: Démarrer et activer Docker au démarrage
  systemd:
    name: docker
    state: started
    enabled: true

- name: Installer Docker Compose (standalone) via pip
  pip:
    name: docker-compose
    state: present
    executable: pip3

- name: Ajouter l'utilisateur au groupe docker
  user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true

- name: Vérifier la version de Docker
  command: docker --version
  register: docker_version
  changed_when: false

- name: Afficher la version de Docker
  debug:
    msg: "{{ docker_version.stdout }}"
