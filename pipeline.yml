name: 🚀 Full DevOps Pipeline

# ─────────────────────────────────────────────────────────────
# Déclencheurs
# ─────────────────────────────────────────────────────────────
on:
  push:
    branches: ["main"]
  workflow_dispatch:   # Permet le déclenchement manuel (utilisé aussi pour destroy)
    inputs:
      action:
        description: "Action to perform"
        required: true
        default: "deploy"
        type: choice
        options:
          - deploy
          - destroy

# ─────────────────────────────────────────────────────────────
# Permissions minimales
# ─────────────────────────────────────────────────────────────
permissions:
  contents: read

jobs:

  # ═══════════════════════════════════════════════════════════
  # 1. TERRAFORM — Provisionnement de l'infrastructure AWS
  # ═══════════════════════════════════════════════════════════
  terraform:
    name: 🏗️ Provision Infrastructure
    runs-on: ubuntu-latest
    if: github.event.inputs.action != 'destroy'

    defaults:
      run:
        working-directory: terraform

    outputs:
      instance_ips: ${{ steps.export.outputs.instance_ips }}
      alb_dns:      ${{ steps.export.outputs.alb_dns }}

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔑 Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: ⚙️ Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: 🔧 Terraform Init
        run: terraform init

      - name: ✅ Terraform Validate
        run: terraform validate

      - name: 📋 Terraform Plan
        run: |
          terraform plan \
            -var="key_name=${{ secrets.EC2_KEY_NAME }}" \
            -out=tfplan

      - name: 🚀 Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: 📤 Export Outputs
        id: export
        run: |
          IPS=$(terraform output -json instance_public_ips \
            | jq -r '.[]' | tr '\n' ',')
          ALB=$(terraform output -raw alb_dns_name)
          echo "instance_ips=$IPS" >> $GITHUB_OUTPUT
          echo "alb_dns=$ALB"      >> $GITHUB_OUTPUT
          echo "✅ Instances IPs : $IPS"
          echo "✅ ALB DNS       : $ALB"

  # ═══════════════════════════════════════════════════════════
  # 2. ANSIBLE — Configuration des serveurs & déploiement app
  # ═══════════════════════════════════════════════════════════
  ansible:
    name: 🔧 Configure & Deploy App
    runs-on: ubuntu-latest
    needs: terraform
    if: github.event.inputs.action != 'destroy'

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Installer Ansible et outils
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ansible jq python3-pip
          ansible --version

      - name: 🔐 Configurer la clé SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_KEY }}" > ~/.ssh/deploy_key.pem
          chmod 600 ~/.ssh/deploy_key.pem
          # Désactiver la vérification de l'hôte (CI uniquement)
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: 📋 Générer l'inventaire Ansible dynamiquement
        run: |
          echo "[web]" > ansible/inventory.ini
          IPS="${{ needs.terraform.outputs.instance_ips }}"
          for ip in $(echo "$IPS" | tr ',' ' '); do
            [ -z "$ip" ] && continue
            echo "$ip ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/deploy_key.pem" \
              >> ansible/inventory.ini
          done
          echo ""
          echo "📋 Inventaire généré :"
          cat ansible/inventory.ini

      - name: ⏳ Attendre que les instances soient prêtes
        run: |
          IPS="${{ needs.terraform.outputs.instance_ips }}"
          for ip in $(echo "$IPS" | tr ',' ' '); do
            [ -z "$ip" ] && continue
            echo "⏳ Attente de $ip..."
            timeout 120 bash -c "until ssh -i ~/.ssh/deploy_key.pem \
              -o StrictHostKeyChecking=no ec2-user@$ip 'echo OK' 2>/dev/null; \
              do sleep 5; done"
            echo "✅ $ip est prête"
          done

      - name: 🎭 Lancer le playbook Ansible
        run: |
          ansible-playbook \
            -i ansible/inventory.ini \
            ansible/deploy.yml \
            --private-key ~/.ssh/deploy_key.pem \
            -v
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          ANSIBLE_STDOUT_CALLBACK: "yaml"

      - name: 🌐 Afficher l'URL de l'application
        run: |
          echo ""
          echo "═══════════════════════════════════════"
          echo "✅ DÉPLOIEMENT RÉUSSI !"
          echo "🌐 Application disponible sur :"
          echo "   http://${{ needs.terraform.outputs.alb_dns }}"
          echo "═══════════════════════════════════════"

  # ═══════════════════════════════════════════════════════════
  # 3. DESTROY — Destruction de l'infrastructure (manuel)
  # ═══════════════════════════════════════════════════════════
  destroy:
    name: 🗑️ Destroy Infrastructure
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'destroy'

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔑 Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: ⚙️ Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: 🔧 Terraform Init
        run: terraform init

      - name: 💥 Terraform Destroy
        run: |
          terraform destroy \
            -var="key_name=${{ secrets.EC2_KEY_NAME }}" \
            -auto-approve
        
      - name: ✅ Infrastructure détruite
        run: echo "✅ Infrastructure AWS détruite avec succès."
