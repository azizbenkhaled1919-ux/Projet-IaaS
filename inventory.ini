# inventory.ini — Exemple de fichier d'inventaire Ansible
# Ce fichier est généré automatiquement par le pipeline GitHub Actions
# Pour les tests locaux, remplacez les IPs par vos instances EC2

[web]
# Remplacer par l'IP publique de vos instances EC2
# 54.12.34.56 ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/my-key.pem
# 54.12.34.57 ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/my-key.pem

[web:vars]
ansible_python_interpreter=/usr/bin/python3
