version: "3.9"

# ─────────────────────────────────────────────────────────────
# docker-compose.yml — Stack e-commerce complète
# Services : nginx (reverse proxy) + nodejs (API) + mongodb (DB)
# ─────────────────────────────────────────────────────────────

services:

  # ── Nginx — Reverse Proxy ──────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - nodejs
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Node.js — API / Application ───────────────────────────
  nodejs:
    image: node:20-alpine
    container_name: nodejs
    restart: unless-stopped
    working_dir: /app
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/ecommerce
      - PORT=3000
    volumes:
      - ./app:/app
    command: >
      sh -c "npm install --production && node server.js"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── MongoDB — Base de données ──────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ecommerce
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

# ── Volumes persistants ─────────────────────────────────────
volumes:
  mongo-data:
    driver: local

# ── Réseau interne ──────────────────────────────────────────
networks:
  app-network:
    driver: bridge
